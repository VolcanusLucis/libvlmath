name: Cross-platform Builds
on:
  pull_request:
    branches: [ 'master' ]

jobs:
  check-files:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      files_found: ${{ steps.found-files.outputs.files_found }}
    
    steps:
      - uses: actions/checkout@v7
      - id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ github.base_ref }}
          files: |
            libvlmath/**
            toolchains/**
            CMake**.**
      - shell: bash
        id: found-files
        run: echo files_found=${{ steps.changed-files.outputs.any_modified }} >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: check-files
    if: needs.check-files.outputs.files_found == 'true'
    permissions:
      contents: read

    strategy:
      fail-fast: true
      matrix:
        target: [ win, linux ]
        architecture: [ x64, x86 ]
        compiler: [ mingw64, gcc ]
        build-type: [ debug, release ]
        exclude:
          - target: win
            compiler: gcc
          - target: linux
            compiler: mingw64

    steps:
      - uses: VolcanusLucis/.github/.github/actions/build-cmake-project-presets@master
        with:
          target: ${{ matrix.target }}
          architecture: ${{ matrix.architecture }}
          compiler: ${{ matrix.compiler }}
          build-type: ${{ matrix.build-type }}

  verify-compilation-task:
    if: always()
    permissions: {}
    runs-on: ubuntu-latest
    needs: [check-files, build]
    steps:
      # https://github.com/orgs/community/discussions/26822
      - if: contains(needs.*.result, 'failure') 
          || contains(needs.*.result, 'cancelled')
          || (needs.check-files.outputs.files_found && contains(needs.*.results, 'skipped'))
        run: exit 1
      - run: exit 0
        